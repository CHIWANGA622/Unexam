<!DOCTYPE html>
<html lang="en">
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#1a3c6e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="UnExam">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnExam - Student Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #f0f4f8;
        }
        .navbar {
            background-color: #1a3c6e;
        }
        .navbar-brand {
            color: white !important;
            font-weight: bold;
            font-size: 1.5rem;
        }
        .tagline {
            color: #a0b4c8;
            font-size: 0.85rem;
        }
        .hero-section {
            flex: 1;
            display: flex;
            align-items: center;
            padding: 40px 0;
        }
        .hero-title {
            font-size: 3.5rem;
            font-weight: 800;
            color: #1a3c6e;
            line-height: 1.1;
        }
        .hero-underline {
            width: 80px;
            height: 4px;
            background-color: #f5820a;
            margin: 10px 0 20px 0;
            border-radius: 2px;
        }
        .hero-subtitle {
            color: #4a5568;
            font-size: 1.1rem;
        }
        .login-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .login-card h4 {
            color: #1a3c6e;
            font-weight: 700;
            margin-bottom: 25px;
        }
        .form-control {
            border-radius: 8px;
            padding: 12px;
            border: 1px solid #d1d9e0;
        }
        .form-control:focus {
            border-color: #1a3c6e;
            box-shadow: 0 0 0 3px rgba(26,60,110,0.1);
        }
        .btn-login {
            background-color: #1a3c6e;
            color: white;
            border-radius: 8px;
            padding: 12px;
            font-weight: 600;
            width: 100%;
            border: none;
        }
        .btn-login:hover {
            background-color: #f5820a;
            color: white;
        }
        .footer {
            background-color: #1a3c6e;
            color: #a0b4c8;
            padding: 20px 0;
            font-size: 0.9rem;
        }
        .footer a {
            color: #a0b4c8;
            text-decoration: none;
            margin: 0 10px;
        }
        .footer a:hover {
            color: #f5820a;
        }
        .illustration svg {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar px-4 py-3">
        <span class="navbar-brand">
            UnExam
        </span>
        <span class="tagline">Secure &bull; Fast &bull; Reliable</span>
    </nav>

    <!-- Hero Section -->
    <div class="hero-section">
        <div class="container">
            <div class="row align-items-center">

                <!-- Left Side -->
                <div class="col-md-6 mb-4 mb-md-0">
                    <h1 class="hero-title">UnExam</h1>
                    <div class="hero-underline"></div>
                    <p class="hero-subtitle">The smart way to manage and take exams online. Secure, fast, and reliable for students and institutions.</p>

                    <!-- SVG Illustration -->
                    <div class="illustration mt-4">
                        <svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" width="380">
                            <!-- Background -->
                            <rect width="400" height="300" fill="#f0f4f8" rx="20"/>
                            
                            <!-- Books -->
                            <rect x="60" y="180" width="40" height="80" fill="#1a3c6e" rx="4"/>
                            <rect x="55" y="175" width="50" height="10" fill="#f5820a" rx="2"/>
                            <rect x="105" y="190" width="35" height="70" fill="#2d5a9e" rx="4"/>
                            <rect x="100" y="185" width="45" height="10" fill="#1a3c6e" rx="2"/>
                            <rect x="143" y="200" width="30" height="60" fill="#4a7cc7" rx="4"/>
                            <rect x="138" y="195" width="40" height="10" fill="#f5820a" rx="2"/>
                            
                            <!-- Graduation Cap -->
                            <ellipse cx="220" cy="120" rx="60" ry="15" fill="#1a3c6e"/>
                            <rect x="195" y="95" width="50" height="30" fill="#1a3c6e" rx="4"/>
                            <polygon points="220,60 160,110 280,110" fill="#2d5a9e"/>
                            <rect x="270" y="110" width="5" height="30" fill="#f5820a"/>
                            <circle cx="275" cy="145" r="8" fill="#f5820a"/>
                            
                            <!-- Stars -->
                            <text x="310" y="80" font-size="20" fill="#f5820a">★</text>
                            <text x="330" y="120" font-size="14" fill="#1a3c6e">★</text>
                            <text x="290" y="150" font-size="16" fill="#f5820a">★</text>
                            
                            <!-- Certificate -->
                            <rect x="290" y="180" width="80" height="60" fill="white" rx="6" stroke="#1a3c6e" stroke-width="2"/>
                            <line x1="300" y1="200" x2="360" y2="200" stroke="#a0b4c8" stroke-width="2"/>
                            <line x1="300" y1="215" x2="355" y2="215" stroke="#a0b4c8" stroke-width="2"/>
                            <circle cx="325" cy="228" r="6" fill="#f5820a"/>
                            
                            <!-- Pencil -->
                            <rect x="150" y="240" width="10" height="40" fill="#f5820a" rx="2" transform="rotate(-30 155 260)"/>
                            <polygon points="150,270 160,270 155,285" fill="#1a3c6e" transform="rotate(-30 155 260)"/>
                        </svg>
                    </div>
                </div>

                <!-- Right Side - Login Card -->
                <div class="col-md-6">
                    <div class="login-card">
                        <h4>Student Login</h4>

                        {% if error %}
                        <div class="alert alert-danger">{{ error }}</div>
                        {% endif %}

                        <form method="POST">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label text-muted">Registration Number</label>
                                <input type="text" name="username" class="form-control" placeholder="Enter your registration number">
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-muted">Password</label>
                                <input type="password" name="password" class="form-control" placeholder="Enter your password">
                            </div>
                            <button type="submit" class="btn-login">Login</button>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer text-center">
        <div class="container">
            <span>&copy; 2026 UnExam &nbsp;|&nbsp;</span>
            <a href="#">About Us</a>
            <a href="#">Help</a>
            <a href="#">Contact Us</a>
        </div>
    </footer>
<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/service-worker.js')
    .then(function(registration) {
        console.log('ServiceWorker registered');
    });
}
</script>

</body>
</html>

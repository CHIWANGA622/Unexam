<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Change Password - UnExam</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4f8; }
        .navbar { background-color: #1a3c6e; }
        .navbar-brand { color: white !important; font-weight: bold; font-size: 1.5rem; }
        .card { border-radius: 16px; border: none; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .btn-primary { background-color: #1a3c6e; border: none; }
        .btn-primary:hover { background-color: #f5820a; }
        .footer { background-color: #1a3c6e; color: #a0b4c8; padding: 15px 0; font-size: 0.85rem; }
        .footer a { color: #a0b4c8; text-decoration: none; margin: 0 10px; }
        .footer a:hover { color: #f5820a; }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

    <!-- Navbar -->
    <nav class="navbar px-4 py-3 d-flex justify-content-between">
        <span class="navbar-brand">UnExam</span>
        <span style="color:#a0b4c8;">
            <a href="/exams/" style="color:#a0b4c8;">Back to Exams</a>
        </span>
    </nav>

    <!-- Content -->
    <div class="container mt-5 flex-grow-1">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card p-4">
                    <h4 style="color:#1a3c6e; font-weight:700;" class="mb-4">Change Password</h4>

                    {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                    {% endif %}

                    {% if success %}
                    <div class="alert alert-success">{{ success }}</div>
                    <a href="/login/" class="btn btn-primary w-100">Login Again</a>
                    {% else %}
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label text-muted">Current Password</label>
                            <input type="password" name="old_password" class="form-control" placeholder="Enter current password">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted">New Password</label>
                            <input type="password" name="new_password" class="form-control" placeholder="Enter new password">
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted">Confirm New Password</label>
                            <input type="password" name="confirm_password" class="form-control" placeholder="Confirm new password">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Change Password</button>
                    </form>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer text-center mt-5">
        <div class="container">
            <span>&copy; 2026 UnExam &nbsp;|&nbsp;</span>
            <a href="#">About Us</a>
            <a href="#">Help</a>
            <a href="#">Contact Us</a>
        </div>
    </footer>

</body>
</html>
